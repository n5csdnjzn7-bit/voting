<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f1f5f9; color: #1e293b; padding: 20px; }
        nav { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        .container { max-width: 800px; margin: 0 auto; }
        .form-section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input[type="text"] { width: 70%; padding: 10px; margin-right: 10px; border: 1px solid #cbd5e1; border-radius: 5px; }
        button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        .btn-group { display: flex; gap: 8px; }
        button.edit-btn { background: #f59e0b; }
        button.edit-btn:hover { background: #d97706; }
        button.save-btn { background: #10b981; }
        button.save-btn:hover { background: #059669; }
        button.delete-btn { background: #ef4444; }
        button.delete-btn:hover { background: #dc2626; }
        button.reset-btn { background: #64748b; margin-top: 25px; width: 100%; padding: 12px; }
        button.reset-btn:hover { background: #475569; }
        .edit-input { padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 1rem; width: 60%; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html">Voting</a>
            <a href="results.html">Results</a>
        </nav>
        <h1>Manage Nominees</h1>

        <div class="form-section">
            <h2>Add New Nominee</h2>
            <div style="display: flex; margin-top: 10px;">
                <input type="text" id="nominee-name-input" placeholder="Enter nominee name...">
                <button onclick="addNominee()">Add</button>
            </div>
        </div>

        <h2>Current Nominees</h2>
        <div id="config-list" style="margin-top: 15px; display: grid; gap: 10px;">Loading...</div>

        <button class="reset-btn" onclick="resetAllVotes()">Reset All Votes to Zero</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        // REPLACE THIS WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
          apiKey: "AIzaSyCROMbu70itT88RPDT8S7gAAOUKNkgwVas",
          authDomain: "voting-app-fcf7c.firebaseapp.com",
          databaseURL: "https://voting-app-fcf7c-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "voting-app-fcf7c",
          storageBucket: "voting-app-fcf7c.firebasestorage.app",
          messagingSenderId: "343602694510",
          appId: "1:343602694510:web:0d0e205b7363d6adde197f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Keep track of the current raw nominee data for resetting
        let currentNomineesData = null;

        db.ref('nominees').on('value', (snapshot) => {
            const data = snapshot.val();
            currentNomineesData = data; // Store copy for reset function
            const container = document.getElementById('config-list');
            container.innerHTML = '';

            if (!data) {
                container.innerHTML = '<p>No nominees listed.</p>';
                return;
            }

            Object.keys(data).forEach(key => {
                const nominee = data[key];
                const div = document.createElement('div');
                div.style = "background: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;";
                
                div.innerHTML = `
                    <div id="display-container-${key}" style="flex-grow: 1; display: flex; align-items: center; justify-content: space-between; margin-right: 20px;">
                        <span id="name-span-${key}"><strong>${nominee.name}</strong> (Votes: ${nominee.votes || 0})</span>
                        <input type="text" id="edit-input-${key}" class="edit-input" value="${nominee.name}" style="display: none;">
                    </div>
                    <div class="btn-group">
                        <button id="edit-btn-${key}" class="edit-btn" onclick="toggleEdit('${key}')">Edit</button>
                        <button id="save-btn-${key}" class="save-btn" onclick="saveEdit('${key}')" style="display: none;">Save</button>
                        <button class="delete-btn" onclick="deleteNominee('${key}')">Remove</button>
                    </div>
                `;
                container.appendChild(div);
            });
        });

        function addNominee() {
            const input = document.getElementById('nominee-name-input');
            const name = input.value.trim();
            if (!name) return;

            db.ref('nominees').push({
                name: name,
                votes: 0
            });
            input.value = '';
        }

        function deleteNominee(key) {
            if (confirm("Are you sure you want to remove this nominee?")) {
                db.ref('nominees/' + key).remove();
            }
        }

        function toggleEdit(key) {
            document.getElementById(`name-span-${key}`).style.display = 'none';
            document.getElementById(`edit-input-${key}`).style.display = 'block';
            
            document.getElementById(`edit-btn-${key}`).style.display = 'none';
            document.getElementById(`save-btn-${key}`).style.display = 'block';
        }

        function saveEdit(key) {
            const newName = document.getElementById(`edit-input-${key}`).value.trim();
            if (!newName) return;

            db.ref('nominees/' + key).update({
                name: newName
            });
        }

        // Reset all nominee votes globally
        function resetAllVotes() {
            if (!currentNomineesData) {
                alert("No nominees to reset!");
                return;
            }

            const confirmation = confirm("Are you sure you want to reset ALL votes to zero? This action cannot be undone.");
            if (confirmation) {
                const updates = {};
                // Prepare an update object to reset votes for every key at once
                Object.keys(currentNomineesData).forEach(key => {
                    updates[`/nominees/${key}/votes`] = 0;
                });

                db.ref().update(updates).then(() => {
                    alert("All votes have been reset to zero successfully!");
                }).catch((error) => {
                    alert("Error resetting votes: " + error.message);
                });
            }
        }
    </script>
</body>
</html>
